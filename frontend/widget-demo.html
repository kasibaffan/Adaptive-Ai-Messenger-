<body>
  <h1>Acme Co. — Sample Website</h1>

  <p>Replace <code>REPLACE_WITH_COMPANY_ID</code> below with an id returned from <code>/auth/register</code>.</p>

  <script
    src="/static/widget.js"
    data-company-id="e72155fd-225e-428e-a3c2-ebbeba6149ff"
    data-accent="#4f46e5">
  </script>
